<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Teste Oficial do Mapa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Scripts do Mapbox -->
    <script src="https://mapbox.com"></script>
    <link href="https://mapbox.com" rel="stylesheet" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #222; color: white; text-align: center; }
        #status { padding: 15px; background-color: #333; font-weight: bold; border-bottom: 2px solid red; }
        #map { position: absolute; top: 50px; bottom: 0; width: 100%; background-color: #555; }
    </style>
</head>
<body>

    <div id="status">Carregando o sistema de mapas...</div>
    <div id="map"></div>

<script>
    // MAS COLOQUE SEU TOKEN APENAS AQUI DENTRO DAS ASPAS:
    const MEU_TOKEN = 'pk.eyJ1Ijoiam9hb3ppbm5uMDIxNyIsImEiOiJjbXJ2MHNsaTIwMmxkMnpvcGF2bHU1cDZhIn0.Nwl43ZxMQImiv9eA5aCwDw';

    document.getElementById('status').innerText = "Validando Token do Mapbox...";

    if (MEU_TOKEN === 'COLE_SEU_TOKEN_REAL_AQUI' || MEU_TOKEN.trim() === '') {
        document.getElementById('status').innerText = "ERRO: Você esqueceu de colocar o seu Token!";
        document.getElementById('status').style.backgroundColor = "purple";
    } else {
        try {
            mapboxgl.accessToken = MEU_TOKEN;
            
            const map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/streets-v12',
                center: [-46.6333, -23.5505], 
                zoom: 11
            });

            map.on('load', () => {
                document.getElementById('status').innerText = "MAPA CARREGADO COM SUCESSO!";
                document.getElementById('status').style.backgroundColor = "green";
            });

            map.on('error', (e) => {
                document.getElementById('status').innerText = "ERRO DO MAPBOX: Token inválido.";
                document.getElementById('status').style.backgroundColor = "orange";
            });

        } catch (error) {
            document.getElementById('status').innerText = "ERRO CRÍTICO no código.";
            document.getElementById('status').style.backgroundColor = "darkred";
        }
    }
</script>

</body>
</html>
