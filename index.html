<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Mapa do Restaurante</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://mapbox.com"></script>
    <link href="https://mapbox.com" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

<script>
    // Seu token já configurado e validado sem erros de digitação
    mapboxgl.accessToken = 'pk.eyJ1Ijoiam9hb3ppbm5uMDIxNyIsImEiOiJjbXJ2MHNsaTIwMmxkMnpvcGF2bHU1cDZhIn0.Nwl43ZxMQImiv9eA5aCwDw';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-46.6333, -23.5505], // Centralizado em São Paulo
        zoom: 12
    });

    // Marcador do motoboy no centro do mapa
    new mapboxgl.Marker({ color: 'red' })
        .setLngLat([-46.6333, -23.5505])
        .addTo(map);
</script>

</body>
</html>
